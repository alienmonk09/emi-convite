<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Aniversário - Emília</title>

    <!-- Open Graph: preview com imagem ao colar o link (WhatsApp, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Você está convidado! 🧜‍♀️🍰">
    <meta property="og:description" content="Aniversário da Emília — 28/06/2026 às 18h, na casa da dona Ruth. Vem comer bolo!">
    <meta property="og:image" content="https://alienmonk09.github.io/emi-convite/banner.jpg">
    <meta property="og:image:width" content="1690">
    <meta property="og:image:height" content="1351">
    <meta property="og:url" content="https://alienmonk09.github.io/emi-convite/">
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
        }
        .font-cursive { 
            font-family: 'Pacifico', cursive; 
        }
        /* Fundo inspirado no fundo do mar com gradiente suave */
        .bg-ocean { 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); 
        }
        /* Animação das bolhas do fundo do mar */
        .bubble {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.35);
            animation: rise linear infinite;
        }
        /* Tons suaves do gradiente do mar */
        .bubble-white { background: rgba(255, 255, 255, 0.40); }
        .bubble-cyan  { background: rgba(168, 237, 234, 0.45); }
        .bubble-pink  { background: rgba(254, 214, 227, 0.55); }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="bg-ocean min-h-screen flex items-center justify-center p-4 md:p-8 relative overflow-x-hidden">
    
    <!-- Bolhas de fundo (geradas via JS no final do body) -->

    <!-- Container do Convite (gradiente suave do mar) -->
    <div class="bg-gradient-to-b from-white via-cyan-50 to-pink-50 backdrop-blur-sm rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden z-10 border-4 border-white/60 transform transition duration-500 hover:scale-[1.02]">
        
        <!-- Área da Imagem da Sereia (proporção 4:5, corta um pouco o topo) -->
        <div id="agua" class="relative aspect-[4/5] overflow-hidden bg-pink-50 flex items-center justify-center border-b-4 border-pink-200">
            <!-- Fallback caso a imagem não carregue -->
            <span class="absolute text-pink-300 text-sm font-medium z-0 text-center px-4">
                (Salve a imagem da sereia como "image.jpeg" na mesma pasta deste arquivo)
            </span>
            <img src="image.jpeg" alt="Sereia Emília" class="absolute inset-0 w-full h-full object-cover object-bottom z-10" onerror="this.style.opacity='0'">
            <!-- Bolhas dentro da água geradas via JS -->
        </div>

        <!-- Área do Texto e Informações -->
        <div class="p-8 text-center relative">
            <!-- Título Brincalhão -->
            <h1 class="font-cursive text-4xl text-pink-500 mb-6 drop-shadow-sm">Você está convidado!</h1>

            <!-- Mensagem Principal -->
            <p class="text-gray-700 text-lg mb-8 leading-relaxed font-medium px-2">
                Você está convidado para comer um pedaço de bolo comigo. Talvez tenha um refrigerante para não engasgar. 🍰🥤
            </p>

            <!-- Box com os Detalhes do Evento -->
            <div class="bg-gradient-to-r from-blue-50 to-pink-50 rounded-2xl p-5 mb-8 text-left space-y-4 shadow-sm border border-pink-100">
                
                <!-- Data -->
                <div class="flex items-center text-blue-900">
                    <div class="bg-white p-2 rounded-full shadow-sm mr-4 text-pink-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <div>
                        <p class="text-xs text-pink-400 font-bold uppercase tracking-wider">Data</p>
                        <p class="font-semibold text-lg">28/06/2026</p>
                    </div>
                </div>

                <!-- Horário -->
                <div class="flex items-center text-blue-900">
                    <div class="bg-white p-2 rounded-full shadow-sm mr-4 text-pink-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-xs text-pink-400 font-bold uppercase tracking-wider">Horário</p>
                        <p class="font-semibold text-lg">18h</p>
                    </div>
                </div>

                <!-- Local -->
                <div class="flex items-center text-blue-900">
                    <div class="bg-white p-2 rounded-full shadow-sm mr-4 text-pink-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-xs text-pink-400 font-bold uppercase tracking-wider">Local</p>
                        <p class="font-semibold text-lg">Casa da dona Ruth</p>
                    </div>
                </div>
                
            </div>

            <!-- Assinatura -->
            <div class="mt-4 pt-4">
                <p class="font-cursive text-2xl text-pink-400/80">Com carinho,</p>
                <p class="font-cursive text-4xl text-pink-600 mt-2 drop-shadow-sm">Emília</p>
            </div>
        </div>
    </div>

    <!-- Gerador de bolhas animadas -->
    <script>
        const CORES = ['bubble-white', 'bubble-cyan', 'bubble-pink'];
        function criarBolhas(alvo, qtd, { min = 6, max = 28, zIndex = 0 } = {}) {
            const frag = document.createDocumentFragment();
            for (let i = 0; i < qtd; i++) {
                const b = document.createElement('div');
                const tam = Math.round(min + Math.random() * (max - min));
                b.className = 'bubble ' + CORES[Math.floor(Math.random() * CORES.length)];
                b.style.width = b.style.height = tam + 'px';
                b.style.left = Math.round(Math.random() * 96) + '%';
                b.style.animationDuration = (5 + Math.random() * 11).toFixed(1) + 's';
                b.style.animationDelay = (Math.random() * 8).toFixed(1) + 's';
                if (zIndex) b.style.zIndex = zIndex;
                frag.appendChild(b);
            }
            alvo.appendChild(frag);
        }
        // Fundo da página (mais bolhas, maiores)
        criarBolhas(document.body, 45, { min: 8, max: 36 });
        // Dentro da água do convite (menores, sobre a imagem)
        criarBolhas(document.getElementById('agua'), 30, { min: 4, max: 18, zIndex: 20 });
    </script>
</body>
</html>
